schema: xgc2.product.v1
id: xgc2-fs150
name: XGC2 FS150 Robot
version: 0.1.0-5
kind: mixed
summary: Real FS150 robot onboard profile, documentation, and runtime dependency aggregation.
groups:
- robotics
- fs150
apt:
  distribution: focal
  install:
  - xgc2-fs150
  - xgc2-fs150-mavlink-router
  packages:
  - xgc2-fs150
  - xgc2-fs150-mavlink-router
  depends:
  - chrony
  - python3
  - ros-noetic-ros-base
  - ros-noetic-mavros
  - ros-noetic-mavros-extras
  - ros-noetic-vrpn-client-ros
  - xgc2-utils-linux-performance-mode (>= 1.1.0-12)
  - xgc2-mavlink-router (>= 3.0.0-7+focal)
usage:
  install: 'sudo apt update

    sudo apt install xgc2-fs150

    sudo apt install xgc2-fs150-mavlink-router

    '
  smoke_test: 'test -d /opt/xgc2/robots/fs150/docs

    test -f /opt/xgc2/robots/fs150/docs/rk356x_performance_mode.md

    dpkg -s xgc2-fs150

    dpkg -s xgc2-fs150-mavlink-router

    test -f /etc/xgc2/fs150-mavlink-router/router.conf

    systemctl is-enabled xgc2-fs150-mavlink-router.service

    '
  notes: The ROS Noetic and XGC2 APT sources must be configured before installing
    this package.
ownership:
  paths:
  - /opt/xgc2/robots/fs150
  - /usr/share/doc/xgc2-fs150
  - /etc/xgc2/fs150-mavlink-router
  - /lib/systemd/system/xgc2-fs150-mavlink-router.service
  - /usr/share/doc/xgc2-fs150-mavlink-router
release:
  dependency_policy:
    xgc2-linux-utils: verify
    xgc2-mavlink-router: verify
