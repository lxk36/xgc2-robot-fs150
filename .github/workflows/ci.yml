name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Run metadata and shell checks
        run: |
          set -euo pipefail
          git diff --check HEAD
          bash -n .xgc2/scripts/package_deb.sh
          bash -n .xgc2/scripts/build_deb_in_docker.sh
          bash -n .xgc2/scripts/check_installed_package.sh
          bash -n .xgc2/debian/xgc2-fs150-mavlink-router/postinst
          bash -n .xgc2/debian/xgc2-fs150-mavlink-router/prerm
          bash -n .xgc2/debian/xgc2-fs150-mavlink-router/postrm

  build-debs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and install-check deb package
        run: |
          set -euo pipefail
          .xgc2/scripts/build_deb_in_docker.sh \
            --work-dir "$RUNNER_TEMP/xgc2-fs150-all" \
            --output-dir "$GITHUB_WORKSPACE/debs"

      - name: Create trusted build manifest
        run: |
          for architecture in amd64 arm64; do
            python3 .xgc2/scripts/xgc2_artifact_manifest.py build \
              --deb-dir debs \
              --output-dir .ci/build-manifests \
              --product xgc2-fs150 \
              --product-version "$(awk -F': *' '/^version:/ {print $2; exit}' .xgc2/product.yml)" \
              --distribution focal \
              --architecture "$architecture" \
              --source-sha "$GITHUB_SHA" \
              --ci-run-id "$GITHUB_RUN_ID" \
              --ci-workflow "$GITHUB_WORKFLOW" \
              --ci-workflow-ref "$GITHUB_WORKFLOW_REF"
          done

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xgc2-fs150-debs-all
          path: |
            debs/*.deb
            .ci/build-manifests/*.json
          retention-days: 14
          include-hidden-files: true
